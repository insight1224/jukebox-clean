<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticket Admin</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0b0b;
        color: #f5f5f5;
      }
      .wrap {
        width: min(980px, calc(100vw - 2rem));
        margin: 1rem auto 2rem;
      }
      h1 { color: #d4af37; margin: 0 0 .8rem; }
      .row {
        display: flex;
        gap: .5rem;
        margin-bottom: .8rem;
      }
      input {
        flex: 1;
        border-radius: 8px;
        border: 1px solid #333;
        background: #121212;
        color: #fff;
        padding: .58rem .65rem;
      }
      button {
        border: 0;
        border-radius: 8px;
        background: #d4af37;
        color: #111;
        font-weight: 700;
        padding: .6rem .8rem;
        cursor: pointer;
      }
      .table-wrap {
        border: 1px solid rgba(212, 175, 55, 0.2);
        border-radius: 10px;
        overflow: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #101010;
      }
      thead {
        background: #d4af37;
        color: #111;
      }
      th, td {
        text-align: left;
        padding: .6rem .7rem;
        border-top: 1px solid #252525;
      }
      .checked_in { color: #7ff0b0; }
      .not_checked_in { color: #ffd98f; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Ticket Admin</h1>
      <div class="row">
        <input id="search" placeholder="Search by name, email, or ticket ID" />
        <button id="searchBtn" type="button">Search</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Ticket ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Type</th>
              <th>Status</th>
              <th>Created</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>

    <script>
      const rows = document.getElementById("rows");
      const searchInput = document.getElementById("search");
      const searchBtn = document.getElementById("searchBtn");

      function rowHtml(ticket) {
        return `
          <tr>
            <td>${ticket.ticket_id}</td>
            <td>${ticket.name}</td>
            <td>${ticket.email}</td>
            <td>${ticket.ticket_type}</td>
            <td class="${ticket.status}">${ticket.status}</td>
            <td>${ticket.created_at}</td>
          </tr>
        `;
      }

      async function loadTickets() {
        const q = encodeURIComponent((searchInput.value || "").trim());
        const res = await fetch(`/api/admin/tickets?q=${q}`);
        const data = await res.json();
        rows.innerHTML = (data.tickets || []).map(rowHtml).join("");
      }

      searchBtn.addEventListener("click", loadTickets);
      searchInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") loadTickets();
      });

      loadTickets();
    </script>
  </body>
</html>

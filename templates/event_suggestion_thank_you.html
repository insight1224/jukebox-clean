<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Idea Received | The Jukebox Lounge NC</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(39, 94, 61, 0.32), transparent 45%),
        linear-gradient(145deg, #050706, #0b110d 55%, #050505);
      color: #f6f0e2;
      font-family: Arial, Helvetica, sans-serif;
    }

    .confirmation-card {
      width: min(660px, 100%);
      padding: 42px 34px;
      text-align: center;
      background: linear-gradient(155deg, rgba(28, 51, 37, 0.97), rgba(15, 17, 16, 0.99));
      border: 1px solid rgba(212, 175, 55, 0.62);
      border-radius: 22px;
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.58);
    }

    .icon {
      width: 78px;
      height: 78px;
      margin: 0 auto 20px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid rgba(212, 175, 55, 0.65);
      background: #0b0d0c;
      color: #d4af37;
      font-size: 34px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: #d4af37;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 16px;
      color: #fff7e4;
      font-family: Georgia, serif;
      font-size: clamp(30px, 6vw, 44px);
    }

    p {
      margin: 0 auto;
      max-width: 520px;
      color: #d5d5d5;
      line-height: 1.7;
    }

    .idea {
      margin: 24px auto 0;
      padding: 16px;
      border: 1px solid rgba(212, 175, 55, 0.24);
      border-radius: 12px;
      background: rgba(3, 7, 5, 0.45);
      color: #f0d475;
      font-weight: 700;
    }

    .actions {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    a {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 9px;
      text-decoration: none;
      font-weight: 700;
    }

    .primary {
      background: linear-gradient(135deg, #d4af37, #f0d475);
      color: #111;
    }

    .secondary {
      border: 1px solid rgba(212, 175, 55, 0.42);
      color: #e8cf7b;
    }
  </style>
</head>

<body>
  <main class="confirmation-card">
    <div class="icon">✓</div>
    <p class="eyebrow">Event Idea Received</p>
    <h1>Thank You for the Suggestion!</h1>

    <p>
      Your idea has been sent to The Jukebox Lounge NC team and will help shape future events and experiences.
    </p>

    {% if event_name %}
    <div class="idea">
      Your suggestion: {{ event_name }}
    </div>
    {% endif %}

    <div class="actions">
      <a class="primary" href="/events">Back to Events</a>
      <a class="secondary" href="/">Return Home</a>
    </div>
  </main>
</body>
</html>
